<!doctype html>
<html lang="en">
  <head>

    <title>TN-ITS News</title>

    <!-- Common styles -->
    <link href="/common.css" rel="stylesheet" />

    <style>
      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 40px;
        display: grid;
        grid-template-columns: 350px 1fr;
        gap: 30px;
      }

      .sidebar {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 24px;
        height: fit-content;
        position: sticky;
        top: 20px;
      }

      .sidebar h2 {
        color: #2d3748;
        font-weight: 600;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 2px solid #ff6900;
      }

      .updates-box {
        padding: 24px;
      }

      .updates-box md-block {
        display: block;
        margin-bottom: 18px;
      }

      .updates-box md-block:not(:last-child) {
        border-bottom: 1px solid #e2e8f0;
        padding-bottom: 18px;
        margin-bottom: 24px;
      }

      .updates-box md-block h1,
      .updates-box md-block h2,
      .updates-box md-block h3,
      .updates-box md-block h4,
      .updates-box md-block h5,
      .updates-box md-block h6 {
        margin-top: 18px;
      }

      .updates-box ul,
      .updates-box ol {
        padding-left: 20px;
        margin-top: 0;
        margin-bottom: 0;
      }

      .type-code {
        font-family: 'Courier New', monospace;
        font-size: 0.9rem;
      }

      .main-content {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 32px;
        min-height: 500px;
      }

      .empty-state {
        text-align: center;
        padding: 80px 20px;
        color: #a0aec0;
      }

      @media (max-width: 1024px) {
        .container {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
        }
      }

      @media (max-width: 768px) {
        .header {
          padding: 16px 20px;
        }

        .container {
          padding: 20px;
        }

        h1 {
          font-size: 1.25rem;
        }

        .main-content {
          padding: 20px;
        }
      }
    </style>
  </head>
